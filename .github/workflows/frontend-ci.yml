name: frontend-ci

on:
  push:
    branches: [ main, add-cms ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  NODE_VERSION: 22
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/cozyhome-storefront

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build storefront
        run: npm run build

  cms-smoke:
    needs: build
    if: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && vars.FRONTEND_STAGING_BASE_URL != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run CMS smoke tests against staging
        env:
          PLAYWRIGHT_BASE_URL: ${{ vars.FRONTEND_STAGING_BASE_URL }}
          PLAYWRIGHT_API_BASE_URL: ${{ vars.FRONTEND_STAGING_API_BASE_URL }}
          PLAYWRIGHT_CMS_NAV_PLACEMENT: ${{ vars.CMS_SMOKE_NAV_PLACEMENT }}
          PLAYWRIGHT_CMS_PAGE_SLUG: ${{ vars.CMS_SMOKE_PAGE_SLUG }}
          PLAYWRIGHT_USE_WEBSERVER: "false"
        run: npm run e2e -- e2e/cms-smoke.spec.js

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-cms-smoke-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  publish-image:
    needs: build
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push storefront image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:main
